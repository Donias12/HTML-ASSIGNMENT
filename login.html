<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to DEGOLDED - Your premier tourism and travel booking platform. Access your account to manage bookings and travel plans.">
    <meta name="keywords" content="login, DEGOLDED, tourism, travel booking, account">
    <title>Login - DEGOLDED COMPANY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main">
        <div class="navbar">
            <div class="icon">
                <h2 class="logo">DEGOLDED</h2>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">ABOUT</a></li>
                    <li><a href="services.html">SERVICE</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                    <li><a href="login.html">LOGIN</a></li>
                </ul>
            </div>

            <div class="search">
                <input class="srch" type="search" placeholder="Type to text">
                <button class="btn">Search</button>
            </div>
        </div>

        <div class="login-container">
            <form class="login-form">
                <h1>Login</h1>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember" style="margin: 0;">Remember me</label>
                </div>

                <button type="submit" class="login-btn">Login</button>

                <div class="link-container">
                    <p><a href="#">Forgot password?</a></p>
                </div>

                <div class="divider">OR</div>

                <div class="link-container">
                    <p>Don't have an account? <a href="#">Sign up here</a></p>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn" title="Login with Google">
                        <i class="fab fa-google"></i>
                    </button>
                    <button type="button" class="social-btn" title="Login with Facebook">
                        <i class="fab fa-facebook"></i>
                    </button>
                    <button type="button" class="social-btn" title="Login with Twitter">
                        <i class="fab fa-twitter"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
